name: Scrape and Push to Whey2Much

on:
  # 06:30 IST daily == 01:00 UTC
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape-selenium
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Google Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: "141"

      - name: Remove incompatible ChromeDriver from PATH
        run: |
          if command -v chromedriver; then
            echo "Removing preinstalled chromedriver at $(command -v chromedriver)"
            sudo rm -f "$(command -v chromedriver)"
          else
            echo "No chromedriver found on PATH; nothing to remove."
          fi

      - name: Show versions
        run: |
          python --version
          echo "Chrome path: ${{ steps.chrome.outputs.chrome-path }}"
          ${{ steps.chrome.outputs.chrome-path }} --version || true

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u scraper/scrape.py
          echo "Scrape complete"

      - name: Push prices to Whey2Much
        if: ${{ success() && hashFiles('data/scraped_data.json') != '' }}
        env:
          WHEY2MUCH_API_URL: ${{ secrets.WHEY2MUCH_API_URL }}
          WHEY2MUCH_API_KEY: ${{ secrets.WHEY2MUCH_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          if [ -z "${WHEY2MUCH_API_URL:-}" ] || [ -z "${WHEY2MUCH_API_KEY:-}" ]; then
            echo "❌ Missing secrets. Set WHEY2MUCH_API_URL and WHEY2MUCH_API_KEY in repo Secrets." >&2
            exit 1
          fi
          if [ ! -s data/scraped_data.json ]; then
            echo "❌ data/scraped_data.json not found or empty." >&2
            exit 1
          fi
          python -u scraper/push_to_whey2much.py

      - name: Upload results (artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-output
          path: |
            data/scraped_data.json
            data/scraped_data.csv
            data/debug/
          if-no-files-found: warn
